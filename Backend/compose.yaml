services:
  db:
    image: "postgres:18-alpine"

    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "painting_db"
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql

  
  redis:
    image: "redis:7-alpine"
    ports:
      - "6379:6379"


volumes:
  postgres_data:

