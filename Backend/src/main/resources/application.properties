spring.application.name=painting

# Docker
spring.docker.compose.file = compose.yaml
spring.docker.compose.enabled = false


# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/painting_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Liquibase configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.sql
spring.liquibase.enabled=true


 # Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379







